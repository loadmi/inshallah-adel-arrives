<!-- Floating Sound Player -->
<div class="sound-player" [class.is-on]="isOn">
  
  <!-- Toggle Button (always visible) -->
  <button
    class="sound-toggle-btn"
    [class.active]="isOn"
    (click)="togglePlayer()"
    [attr.aria-label]="isOn ? 'Turn off music' : 'Turn on music'"
    type="button"
  >
    <!-- Sound Off Icon -->
    <svg *ngIf="!isOn" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <line x1="23" y1="9" x2="17" y2="15"/>
      <line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
    <!-- Sound On Icon -->
    <svg *ngIf="isOn" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
  </button>

  <!-- Expanded Player Panel (visible when on) -->
  <div class="player-panel" *ngIf="isOn">

    <!-- Controls Row -->
    <div class="player-controls">
      
      <!-- Play/Pause Button -->
      <button
        class="play-pause-btn"
        (click)="togglePlayPause()"
        [attr.aria-label]="isPlaying ? 'Pause' : 'Play'"
        type="button"
      >
        <!-- Play Icon -->
        <svg *ngIf="!isPlaying" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <!-- Pause Icon -->
        <svg *ngIf="isPlaying" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16"/>
          <rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>

      <!-- Progress Bar -->
      <div class="progress-wrapper" (click)="onProgressClick($event)">
        <div class="progress-track">
          <div class="progress-fill" [style.width.%]="progressPercent"></div>
          <div class="progress-thumb" [style.left.%]="progressPercent"></div>
        </div>
      </div>

      <!-- Time Display -->
      <span class="time-display">
        {{ formatTime(currentTime) }}
      </span>
    </div>
  </div>
</div>
